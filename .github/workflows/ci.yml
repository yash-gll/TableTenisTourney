name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tt
          POSTGRES_PASSWORD: tt
          POSTGRES_DB: tt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tt"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://tt:tt@localhost:5432/tt_test
      TEST_DATABASE_URL: postgresql+psycopg://tt:tt@localhost:5432/tt_test
      JWT_SECRET: ci-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Type check
        run: mypy app
      - name: Migrate (verify Alembic upgrade + downgrade on fresh Postgres)
        run: |
          alembic upgrade head
          alembic downgrade base
      - name: Test (Postgres-backed)
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
